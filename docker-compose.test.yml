version: '3.8'

services:
  db-test:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test_root
      MYSQL_DATABASE: platinum_casino_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_pass
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/mysql
